, "title": "Anomaly triage and disposition", "features": [17201], "done": 1, "inprog": 0, "back": 7, "total": 8, "pct": 12}, {"id": "S15.1", "persona": "Operator", "uc": "UC15", "title": "Real-time site state on shift start", "features": [17198, 17651, 17654, 17659, 17656], "done": 5, "inprog": 0, "back": 27, "total": 32, "pct": 16}, {"id": "S15.2", "persona": "Operator", "uc": "UC15", "title": "Per-device KPIs and shift notes (read-only)", "features": [17198], "done": 0, "inprog": 0, "back": 4, "total": 4, "pct": 0}, {"id": "S16.1", "persona": "Operator", "uc": "UC16", "title": "Tool routing to SOP Librarian + weather", "features": [17192, 17193, 2611], "done": 2, "inprog": 0, "back": 19, "total": 21, "pct": 10}, {"id": "S16.2", "persona": "Operator", "uc": "UC16", "title": "Refuse out-of-scope / ungrounded requests", "features": [17624, 17192], "done": 0, "inprog": 0, "back": 8, "total": 8, "pct": 0}, {"id": "S17.1", "persona": "Executive", "uc": "UC17", "title": "Single-pane fleet posture", "features": [17202, 15433], "done": 0, "inprog": 0, "back": 6, "total": 6, "pct": 0}, {"id": "S17.2", "persona": "Executive", "uc": "UC17", "title": "Scales with onboarding; no config exposure", "features": [17202, 8720], "done": 0, "inprog": 0, "back": 6, "total": 6, "pct": 0}, {"id": "X1", "persona": "Cross-persona", "uc": "X", "title": "New site: provisioning \u2192 onboarding \u2192 compliance \u2192 live \u2192 fleet", "features": [14717, 18404, 17993, 2612, 17202], "done": 25, "inprog": 0, "back": 14, "total": 39, "pct": 64}, {"id": "X2", "persona": "Cross-persona", "uc": "X", "title": "SOP change propagates to compliance + assistant grounding", "features": [17199, 2611, 17223], "done": 3, "inprog": 0, "back": 20, "total": 23, "pct": 13}, {"id": "X3", "persona": "Cross-persona", "uc": "X", "title": "Optimization recommendation surfaced to operator + executive", "features": [14037, 17203, 17198, 17202], "done": 1, "inprog": 1, "back": 14, "total": 16, "pct": 6}];

document.getElementById('md').innerHTML = marked.parse("# Helios M2 \u2014 End-to-End Acceptance Scenarios\n\n> Engineering-facing scenarios, one or more per use case, organized by persona, plus a **cross-persona**\n> integration section. Each scenario leads with a short **narrative** (\"day in the life\") and is followed\n> by a formal **Given / When / Then** acceptance form and the backing Azure DevOps work items\n> (Features `F#` / User Stories `US#`).\n>\n> **M2 scope:** monitoring / advisory only. Helios observes, advises, and reports; equipment control\n> stays with the customer's on-prem layer. \"Done\" implies the UI/API/agent surfaces exist and are\n> IAM-scoped, audit-logged, and grounded in live platform data.\n>\n> Work-item links: `https://dev.azure.com/qcellsces/Helios/_workitems/edit/<id>`\n\n---\n\n## Organization Admin\n\n### UC10 \u2014 Organization Tenant Administration\n\n**S10.1 \u2014 Provision a new operator before go-live**\n\n*Narrative:* A new operations hire joins the customer org ahead of go-live. The Org Admin opens Helios \u2014 scoped to their own organization only \u2014 creates the user with the required governance attributes, drops them into the \"Operator\" group, and assigns the Operator role. Helios provisions the identity in Entra behind the IAM layer. When the operator logs in for the first time, they land on their assigned site with no admin surfaces in sight.\n\n- **Given** an Org Admin authenticated with tenant-admin role, scoped to their own organization,\n- **When** they create a user, add them to the \"Operator\" group, and assign the Operator role,\n- **Then** the IAM layer provisions the identity in Entra, the role is persisted, and the assignment is written to the audit log with actor + timestamp.\n- **And** the new operator, on next login, sees only their assigned site(s) and no admin surfaces (IAM scoping enforced on every page/API).\n\n**S10.2 \u2014 Deactivate access and prove enforcement**\n\n*Narrative:* A contractor's engagement ends. The admin deactivates the user in one action and access disappears everywhere at once. Moments later a lingering API call carrying the contractor's old token is rejected at the access-check layer, and the denial lands in the audit trail \u2014 proof the boundary holds.\n\n- **Given** an active contractor user in the org,\n- **When** the admin deactivates the user,\n- **Then** access is revoked across all UI and API surfaces in a single action,\n- **And** a subsequent API call bearing the contractor's token is rejected (checkAccess denies), with the denial captured in the audit trail.\n\n> **Backing work items:** [F#17196](https://dev.azure.com/qcellsces/Helios/_workitems/edit/17196) User Management ([US#18361](https://dev.azure.com/qcellsces/Helios/_workitems/edit/18361) Group Management, [US#18362](https://dev.azure.com/qcellsces/Helios/_workitems/edit/18362) Role Reassignment, [US#18363](https://dev.azure.com/qcellsces/Helios/_workitems/edit/18363) IAM Scoping, [US#18374](https://dev.azure.com/qcellsces/Helios/_workitems/edit/18374) View Users) \u00b7 [F#17195](https://dev.azure.com/qcellsces/Helios/_workitems/edit/17195) Admin Dashboards ([US#17621](https://dev.azure.com/qcellsces/Helios/_workitems/edit/17621) IAM Scoping for Pages) \u00b7 [F#10273](https://dev.azure.com/qcellsces/Helios/_workitems/edit/10273) Hierarchical RBAC \u00b7 [F#17182](https://dev.azure.com/qcellsces/Helios/_workitems/edit/17182) IAM Integration (checkAccess) \u00b7 [F#18409](https://dev.azure.com/qcellsces/Helios/_workitems/edit/18409) Audit log \u00b7 [F#17205](https://dev.azure.com/qcellsces/Helios/_workitems/edit/17205) Shell & Session ([US#18337](https://dev.azure.com/qcellsces/Helios/_workitems/edit/18337) Navigation and Scope)\n\n---\n\n## Operations Manager\n\n### UC11 \u2014 Site Onboarding & SOP Ingestion\n\n**S11.1 \u2014 Ingest a site document package into a candidate digital twin**\n\n*Narrative:* A newly contracted data center needs to come online. The Ops Manager drops the site's document package \u2014 single-line diagrams, equipment schedules, the site profile, SOPs, tariffs \u2014 onto the upload page. The Onboarding Agent registers every file, runs OCR/Document Intelligence over them, and assembles a candidate Knowledge Graph of devices, telemetry points, and topology, plus an extracted bill of materials.\n\n- **Given** a new site with a document package (SLDs, equipment schedules, site profile, SOPs, tariffs),\n- **When** the Ops Manager uploads the package on the Document Upload page,\n- **Then** the Onboarding Agent registers each document, runs OCR/Document Intelligence extraction, and produces a candidate Knowledge Graph (devices, telemetry points, topology) plus an extracted BOM.\n\n**S11.2 \u2014 Human-in-the-loop review gate before publish**\n\n*Narrative:* The agent doesn't get the last word. Low-confidence extractions are pushed to a review prompt where the manager corrects a mislabeled chiller, confirms the rest, and sets up value streams and tariffs. Only when they explicitly approve does the twin publish and the site go live \u2014 in hours, not weeks. Nothing slips through unreviewed.\n\n- **Given** the agent has produced extracted entities with per-field confidence scores,\n- **When** low-confidence items are surfaced at the Human Review prompt,\n- **Then** the manager can correct/confirm each item, configure value streams + tariffs, and only on explicit approval (HITL gate) is the digital twin published and the site set live.\n- **And** nothing is auto-merged without passing the review gate.\n\n> **Backing work items:** [F#2612](https://dev.azure.com/qcellsces/Helios/_workitems/edit/2612) Onboarding Agent ([US#9299](https://dev.azure.com/qcellsces/Helios/_workitems/edit/9299) Document registry, [US#10424](https://dev.azure.com/qcellsces/Helios/_workitems/edit/10424) Device Inventory & BOM, [US#12505](https://dev.azure.com/qcellsces/Helios/_workitems/edit/12505) Azure Document Intelligence) \u00b7 [F#17197](https://dev.azure.com/qcellsces/Helios/_workitems/edit/17197) Onboarding Flow ([US#18320](https://dev.azure.com/qcellsces/Helios/_workitems/edit/18320) Document Upload Page, [US#18322](https://dev.azure.com/qcellsces/Helios/_workitems/edit/18322) Human Review Prompt, [US#18324](https://dev.azure.com/qcellsces/Helios/_workitems/edit/18324) Tariff + Value Streams) \u00b7 [F#17325](https://dev.azure.com/qcellsces/Helios/_workitems/edit/17325) HITL Gates 1 & 2 \u00b7 [F#17327](https://dev.azure.com/qcellsces/Helios/_workitems/edit/17327) Document Classifier (C3) \u00b7 [F#17296](https://dev.azure.com/qcellsces/Helios/_workitems/edit/17296) Site Profile Extractor (C5) \u00b7 [F#17298](https://dev.azure.com/qcellsces/Helios/_workitems/edit/17298) Electrical SLD Extractor (C7)\n\n### UC12 \u2014 SOP Compliance Governance\n\n**S12.1 \u2014 Surface SOP-to-equipment coverage gaps**\n\n*Narrative:* It's the quarterly compliance pass. The Ops Manager opens the Compliance View and immediately sees, per piece of equipment, whether it's bound to a current SOP version. Helios flags the gaps it cares about \u2014 a chiller with no governing SOP, and an orphaned SOP bound to nothing.\n\n- **Given** a site whose digital twin has equipment bound to SOP versions,\n- **When** the Ops Manager opens the Compliance View,\n- **Then** the system shows, per equipment, whether it is bound to a current SOP version, and surfaces gaps (equipment with no SOP; SOPs bound to no equipment).\n\n**S12.2 \u2014 Bidirectional drilldown + audit export**\n\n*Narrative:* To close the loop for the customer's governance review, the manager clicks into a chiller and drills straight to its governing SOPs \u2014 then the other direction, SOP to bound equipment. A cross-site rollup and audit-trail export give the auditors the evidence they need.\n\n- **Given** the compliance view is loaded and IAM-scoped to the manager's sites,\n- **When** they select a device,\n- **Then** they can drill from equipment \u2192 governing SOPs and from SOP \u2192 bound equipment,\n- **And** export a cross-site compliance rollup with an audit trail.\n\n> **Backing work items:** [F#17200](https://dev.azure.com/qcellsces/Helios/_workitems/edit/17200) Compliance & Optimization Review ([US#18331](https://dev.azure.com/qcellsces/Helios/_workitems/edit/18331) Compliance View, [US#18332](https://dev.azure.com/qcellsces/Helios/_workitems/edit/18332) Equipment\u2192SOP, [US#18333](https://dev.azure.com/qcellsces/Helios/_workitems/edit/18333) SOP\u2192Equipment, [US#18334](https://dev.azure.com/qcellsces/Helios/_workitems/edit/18334) Audit Trail View) \u00b7 [F#17204](https://dev.azure.com/qcellsces/Helios/_workitems/edit/17204) Audit Evidence Views \u00b7 [F#2611](https://dev.azure.com/qcellsces/Helios/_workitems/edit/2611) SOP Librarian Agent \u00b7 [F#17184](https://dev.azure.com/qcellsces/Helios/_workitems/edit/17184) Audit Service Integration\n\n### UC13 \u2014 Optimization Plan Review\n\n**S13.1 \u2014 Generate a rate-limited, explained HVAC recommendation**\n\n*Narrative:* The daily optimization cadence comes due for a site. The multi-component HVAC optimizer, fed by live telemetry plus tariff, weather, and forecast inputs, produces a proposed setpoint/staging change \u2014 capped at one change per asset per day so nothing thrashes. The Plan Narration Agent turns the math into a plain-language explanation: what it wants to change, why, and the expected effect.\n\n- **Given** a site with a live twin, tariff/weather/forecast inputs, and the optimization cadence due,\n- **When** the multi-component HVAC optimizer runs,\n- **Then** it produces a proposed setpoint/staging change constrained to **\u22641 change per asset per day**,\n- **And** the Plan Narration Agent renders a plain-language explanation (what, why, expected effect).\n\n**S13.2 \u2014 Advisory-only review (no execution in M2)**\n\n*Narrative:* The recommendation lands in the manager's review queue. They read the narration, agree with it, and acknowledge it. Helios records the decision \u2014 but does not touch the equipment. In M2 the plan is advice; if adopted, it's handed to the on-prem control layer to execute.\n\n- **Given** a generated optimization plan in the review queue,\n- **When** the Ops Manager reviews and acknowledges it on the Opt View,\n- **Then** the decision is recorded and **no command is executed by Helios** \u2014 the recommendation is advisory and handed to the on-prem layer if adopted.\n\n> **Backing work items:** [F#14037](https://dev.azure.com/qcellsces/Helios/_workitems/edit/14037) Multi-Component HVAC Optimization ([US#14148](https://dev.azure.com/qcellsces/Helios/_workitems/edit/14148) multi-chiller/AHU model, [US#14149](https://dev.azure.com/qcellsces/Helios/_workitems/edit/14149) staging/economization) \u00b7 [F#17750](https://dev.azure.com/qcellsces/Helios/_workitems/edit/17750) HVAC energy optimization (tariff/billing) \u00b7 [F#17200](https://dev.azure.com/qcellsces/Helios/_workitems/edit/17200) Compliance & Optimization Review ([US#18336](https://dev.azure.com/qcellsces/Helios/_workitems/edit/18336) Opt View) \u00b7 [F#17203](https://dev.azure.com/qcellsces/Helios/_workitems/edit/17203) Notifications & Review Queues \u00b7 [F#13576](https://dev.azure.com/qcellsces/Helios/_workitems/edit/13576) Weather data \u00b7 [F#14025](https://dev.azure.com/qcellsces/Helios/_workitems/edit/14025) Tariff CDM Support\n\n### UC14 \u2014 Utility Bill Management\n\n**S14.1 \u2014 Line-item extraction with confidence**\n\n*Narrative:* The monthly utility invoice arrives as a PDF. The Ops Manager uploads it to the Utility Bill Review surface, and the UL 3115\u2013certified UUDRI engine pulls apart every charge, demand value, and usage figure down to line-item detail \u2014 each annotated with a confidence score so the reviewer knows what to trust.\n\n- **Given** a monthly utility invoice (PDF) for a site,\n- **When** it is uploaded to the Utility Bill Review surface,\n- **Then** the UUDRI engine (UL 3115 certified) extracts charges, demand, and usage at line-item granularity, each with a confidence score.\n\n**S14.2 \u2014 Anomaly triage and disposition**\n\n*Narrative:* Helios cross-checks the extracted charges against metered/twin usage for the period and flags a demand-charge spike that doesn't match reality. On the Anomaly View the manager reviews the flag and chooses to dispute it; the dispute is tracked through to resolution with the decision on record.\n\n- **Given** extracted line items and metered/twin usage for the period,\n- **When** Helios detects a discrepancy (e.g., demand-charge spike vs. metered demand),\n- **Then** the anomaly is flagged on the Anomaly View,\n- **And** the manager can approve, dispute, or escalate each flagged item, with the disposition tracked to resolution.\n\n> **Backing work items:** [F#17201](https://dev.azure.com/qcellsces/Helios/_workitems/edit/17201) Utility Bill Review ([US#17636](https://dev.azure.com/qcellsces/Helios/_workitems/edit/17636) UUDRI API, [US#17637](https://dev.azure.com/qcellsces/Helios/_workitems/edit/17637) Results display, [US#17638](https://dev.azure.com/qcellsces/Helios/_workitems/edit/17638) Anomaly View, [US#11082](https://dev.azure.com/qcellsces/Helios/_workitems/edit/11082) confidence scores, [US#17640](https://dev.azure.com/qcellsces/Helios/_workitems/edit/17640) Upload interface)\n\n---\n\n## Operator\n\n### UC15 \u2014 Live Facility Visibility\n\n**S15.1 \u2014 Real-time site state on shift start**\n\n*Narrative:* An operator clocks in and opens the Live Facility View for their assigned site. The digital twin renders the current equipment topology with power and cooling status \u2014 all grounded in the live Sparkplug B telemetry stream that's been decoded, mapped to canonical KG names, and enriched as it flows in.\n\n- **Given** an operator authenticated and scoped to an assigned site,\n- **When** they open the Live Facility View,\n- **Then** the digital twin renders current equipment topology with power & cooling status grounded in the live Sparkplug B telemetry stream (decoded \u2192 mapped to KG canonical names \u2192 enriched).\n\n**S15.2 \u2014 Per-device KPIs and shift notes (read-only)**\n\n*Narrative:* The operator clicks into a specific CRAC unit and watches its KPIs tick over from the live feed. They leave a note for the next shift \u2014 \"Unit 3 fan noise, monitoring\" \u2014 which sticks to the record. There's no button to change anything: the view is strictly read-only in M2.\n\n- **Given** the live view is open,\n- **When** the operator selects a specific device,\n- **Then** per-device KPIs update from the live stream,\n- **And** they can record an operational note retained in the record for the next shift,\n- **And** no control action is available (read-only enforced).\n\n> **Backing work items:** [F#17198](https://dev.azure.com/qcellsces/Helios/_workitems/edit/17198) DT Representation + Live Facility View ([US#18356](https://dev.azure.com/qcellsces/Helios/_workitems/edit/18356) In-line Views, [US#18357](https://dev.azure.com/qcellsces/Helios/_workitems/edit/18357) Telemetry Views, [US#18358](https://dev.azure.com/qcellsces/Helios/_workitems/edit/18358) Telemetry Queries) \u00b7 [F#17651](https://dev.azure.com/qcellsces/Helios/_workitems/edit/17651) Decode Sparkplug B \u00b7 [F#17654](https://dev.azure.com/qcellsces/Helios/_workitems/edit/17654) Map metrics to KG \u00b7 [F#17659](https://dev.azure.com/qcellsces/Helios/_workitems/edit/17659) Enrich telemetry \u00b7 [F#17656](https://dev.azure.com/qcellsces/Helios/_workitems/edit/17656) 24/7 pipeline on AKS\n\n### UC16 \u2014 Conversational Ops Assistant\n\n**S16.1 \u2014 Tool routing to SOP Librarian + weather**\n\n*Narrative:* Following up, the operator asks for the procedure on a chilled-water alarm. The assistant routes the question through the BFF\u2192MCP layer to the SOP Librarian Agent, which returns the right procedure with source citations. When the operator asks about conditions, the assistant pulls weather and telemetry context and answers with a confidence qualifier.\n\n- **Given** an active chat session,\n- **When** the operator asks for the SOP governing a chilled-water alarm,\n- **Then** the BFF\u2192MCP layer routes the query to the SOP Librarian Agent, which returns the relevant procedure with source citations,\n- **And** weather/telemetry context is fetched when relevant, with a confidence-qualified answer.\n\n**S16.2 \u2014 Refuse out-of-scope / ungrounded requests**\n\n*Narrative:* The operator tries to shortcut a fix: *\"set the chiller setpoint to 68.\"* The assistant declines \u2014 it's read/recommend-only in M2 \u2014 and explains why rather than pretending. Likewise, when asked something the data can't support, it says so instead of guessing.\n\n- **Given** an active chat session in M2,\n- **When** the operator requests an equipment control action (\"set chiller setpoint to 68\") or asks something unsupported by available data,\n- **Then** the assistant refuses, states it is read/recommend-only in M2, and does not fabricate an answer (confidence bounds enforced).\n\n> **Backing work items:** [F#17192](https://dev.azure.com/qcellsces/Helios/_workitems/edit/17192) Agentic UI ([US#17212](https://dev.azure.com/qcellsces/Helios/_workitems/edit/17212) chat shell, [US#17213](https://dev.azure.com/qcellsces/Helios/_workitems/edit/17213) grounding/citations, [US#17214](https://dev.azure.com/qcellsces/Helios/_workitems/edit/17214) reference cards) \u00b7 [F#17193](https://dev.azure.com/qcellsces/Helios/_workitems/edit/17193) BFF to MCP ([US#17208](https://dev.azure.com/qcellsces/Helios/_workitems/edit/17208) SOP Librarian integration, [US#17209](https://dev.azure.com/qcellsces/Helios/_workitems/edit/17209) semantic tool mapping, [US#17211](https://dev.azure.com/qcellsces/Helios/_workitems/edit/17211) tool logging) \u00b7 [F#2611](https://dev.azure.com/qcellsces/Helios/_workitems/edit/2611) SOP Librarian Agent ([US#17219](https://dev.azure.com/qcellsces/Helios/_workitems/edit/17219) NL query w/ citations) \u00b7 [F#17624](https://dev.azure.com/qcellsces/Helios/_workitems/edit/17624) EMS Chat Agent Expansion ([US#17627](https://dev.azure.com/qcellsces/Helios/_workitems/edit/17627) Confidence Bounds)\n\n---\n\n## Executive\n\n### UC17 \u2014 Fleet Operational Status\n\n**S17.1 \u2014 Single-pane fleet posture**\n\n*Narrative:* An executive \u2014 data center owner, CIO, or CFO \u2014 opens the Executive Fleet View and gets the whole organization at a glance: current operational state across every onboarded site, always current from live data, with no analyst compiling a deck. Sites that need attention \u2014 degraded conditions, recent escalations \u2014 float to the top.\n\n- **Given** an executive with organization-scoped read access,\n- **When** they open the Executive Fleet View,\n- **Then** they see current operational state across every onboarded site, sourced live (no manual compilation), with sites needing attention (degraded conditions, recent escalations) surfaced.\n\n**S17.2 \u2014 Scales with onboarding; no config exposure**\n\n*Narrative:* A new site finishes onboarding and goes live. Without anyone wiring anything up, it shows up in the executive's fleet view on the next refresh. The view stays strictly observational \u2014 there are no operational configuration controls anywhere on it.\n\n- **Given** a new site is onboarded and goes live (UC11),\n- **When** the executive refreshes the fleet view,\n- **Then** the new site appears automatically in the aggregation,\n- **And** no operational configuration controls are exposed (read-only, org-scoped).\n\n> **Backing work items:** [F#17202](https://dev.azure.com/qcellsces/Helios/_workitems/edit/17202) Executive Fleet View ([US#17644](https://dev.azure.com/qcellsces/Helios/_workitems/edit/17644) IAM Scoping, [US#17646](https://dev.azure.com/qcellsces/Helios/_workitems/edit/17646) Screen Implementation, [US#17647](https://dev.azure.com/qcellsces/Helios/_workitems/edit/17647) KPI Sync, [US#17648](https://dev.azure.com/qcellsces/Helios/_workitems/edit/17648) Aggregator API) \u00b7 [F#15433](https://dev.azure.com/qcellsces/Helios/_workitems/edit/15433) API support for Fleet Management \u00b7 [F#8720](https://dev.azure.com/qcellsces/Helios/_workitems/edit/8720) Authorization Model & Data Flow for Fleet Intelligence\n\n---\n\n## Cross-Persona / Cross-UC Integration Flows\n\n### X1 \u2014 New site: provisioning \u2192 onboarding \u2192 compliance \u2192 live ops \u2192 fleet\n\n*Narrative:* A new data center is signed. The Org Admin spins up the org and the operator/manager accounts with the right scopes. The Ops Manager feeds in the document package; the Onboarding Agent builds the candidate twin and the manager approves it live at the HITL gate. Compliance bindings compute and the manager confirms no critical equipment is unbound. The operator logs into a live, telemetry-grounded view of exactly that site and queries the assistant (e.g., for the relevant SOPs) to get oriented. And without anyone lifting a finger, the new site shows up in the executive's fleet view. One site identity, one IAM scope, threaded cleanly through every persona's surface.\n\n- **Given** a newly contracted data center and an empty tenant,\n- **When** the **Org Admin** provisions the org and operator/manager users with scoped roles *(UC10)*,\n- **And** the **Ops Manager** uploads the document package; the Onboarding Agent builds the candidate twin and KG, and the manager approves at the HITL gate to set the site live *(UC11)*,\n- **Then** SOP\u2192equipment bindings are computed and the **Ops Manager** confirms compliance coverage with no unbound critical equipment *(UC12)*,\n- **And** the **Operator** logs in to a live, telemetry-grounded facility view scoped to that site and queries the assistant for relevant SOPs *(UC15/UC16)*,\n- **And** the new site appears automatically in the **Executive** fleet view *(UC17)*.\n- **Acceptance:** the same site identity and IAM scope propagate cleanly across every surface; audit entries exist for provisioning, onboarding approval, and compliance sign-off.\n\n> **Backing:** [F#14717](https://dev.azure.com/qcellsces/Helios/_workitems/edit/14717) Onboard org \u00b7 [F#18404](https://dev.azure.com/qcellsces/Helios/_workitems/edit/18404) OMS data model (Org/Region/Site) \u00b7 [F#17993](https://dev.azure.com/qcellsces/Helios/_workitems/edit/17993) OMS Resource APIs \u00b7 [F#18405](https://dev.azure.com/qcellsces/Helios/_workitems/edit/18405) Org\u2194Site ownership \u00b7 [F#2612](https://dev.azure.com/qcellsces/Helios/_workitems/edit/2612) Onboarding Agent \u00b7 [F#17202](https://dev.azure.com/qcellsces/Helios/_workitems/edit/17202) Executive Fleet View\n\n### X2 \u2014 SOP change propagates to compliance + assistant grounding\n\n*Narrative:* A procedure changes. The Ops Manager uploads the revised SOP and rebinds it to the affected equipment. Behind the scenes the SOP Librarian's search index refreshes and the compliance views flip to the new current version. Later, when an operator asks the assistant for that procedure, the answer cites the **revised** version \u2014 not the stale one that was there yesterday.\n\n- **Given** a published site with an existing SOP library,\n- **When** the **Ops Manager** uploads a revised SOP and binds it to equipment via SOP Management *(UC11/UC12)*,\n- **Then** the SOP Librarian's AI Search index is updated and compliance views reflect the new current version,\n- **And** when the **Operator** later asks the assistant for that procedure *(UC16)*, the answer cites the **revised** SOP version, not the stale one.\n- **Acceptance:** index freshness is observable; citations resolve to the new version; change-impact is recorded in the audit trail.\n\n> **Backing:** [F#17199](https://dev.azure.com/qcellsces/Helios/_workitems/edit/17199) SOP Management ([US#18326](https://dev.azure.com/qcellsces/Helios/_workitems/edit/18326) Equipment\u2194SOP binding, [US#18327](https://dev.azure.com/qcellsces/Helios/_workitems/edit/18327) Version History) \u00b7 [F#2611](https://dev.azure.com/qcellsces/Helios/_workitems/edit/2611) SOP Librarian ([US#17221](https://dev.azure.com/qcellsces/Helios/_workitems/edit/17221) change-impact analysis, [US#17898](https://dev.azure.com/qcellsces/Helios/_workitems/edit/17898) hybrid retrieval) \u00b7 [F#17223](https://dev.azure.com/qcellsces/Helios/_workitems/edit/17223) Decompose SOP Extraction Agent\n\n### X3 \u2014 Optimization recommendation surfaced to operator + executive\n\n*Narrative:* The optimizer fires on a live site and proposes a rate-limited HVAC change; the Plan Narration Agent explains it. The operator sees the recommendation in context and can interrogate it through the assistant. If the condition behind it is actually degraded, the same site lights up as \"needs attention\" on the executive's fleet view. Advisory the whole way through \u2014 nothing executes \u2014 and the operator and executive are looking at one consistent story.\n\n- **Given** a live site producing telemetry, with the optimization cadence due,\n- **When** the optimizer generates a rate-limited HVAC recommendation and the Plan Narration Agent explains it *(UC13)*,\n- **Then** the **Operator** sees the recommendation in context and can query the assistant about it *(UC15/UC16)*,\n- **And** if the underlying condition is degraded, the site surfaces as \"needs attention\" in the **Executive** fleet view *(UC17)*.\n- **Acceptance:** advisory-only enforced end-to-end (no execution); the same recommendation/condition is consistently represented across operator and executive surfaces.\n\n> **Backing:** [F#14037](https://dev.azure.com/qcellsces/Helios/_workitems/edit/14037) Multi-Component HVAC Optimization \u00b7 [F#17203](https://dev.azure.com/qcellsces/Helios/_workitems/edit/17203) Notifications & Review Queues \u00b7 [F#17198](https://dev.azure.com/qcellsces/Helios/_workitems/edit/17198) Live Facility View \u00b7 [F#17202](https://dev.azure.com/qcellsces/Helios/_workitems/edit/17202) Executive Fleet View\n\n---\n\n## Traceability summary\n\n| Scenario | Use Case | Primary Feature(s) |\n|----------|----------|--------------------|\n| S10.1\u2013S10.2 | UC10 | F#17196, F#17195, F#10273, F#17182, F#18409 |\n| S11.1\u2013S11.2 | UC11 | F#2612, F#17197, F#17325, F#17327 |\n| S12.1\u2013S12.2 | UC12 | F#17200, F#17204, F#2611 |\n| S13.1\u2013S13.2 | UC13 | F#14037, F#17750, F#17200, F#17203 |\n| S14.1\u2013S14.2 | UC14 | F#17201 |\n| S15.1\u2013S15.2 | UC15 | F#17198, F#17651, F#17654, F#17659 |\n| S16.1\u2013S16.2 | UC16 | F#17192, F#17193, F#2611, F#17624 |\n| S17.1\u2013S17.2 | UC17 | F#17202, F#15433, F#8720 |\n| X1\u2013X3 | cross | F#14717, F#18404, F#17199, F#14037 |\n\n## Open refinement points\n- Validate each cited work item actually scopes the asserted behavior (some UI features are still `New` \u2014 acceptance may be aspirational vs. delivered).\n- Decide whether to encode these as ADO Test Cases linked to the Features for live traceability.\n- The original \"off-hours alerts catch-up\" scenario was **removed** \u2014 no backing alerting Feature exists under UC16. If operator alert/incident surfacing is in scope, it needs a new work item before re-adding.\n");
